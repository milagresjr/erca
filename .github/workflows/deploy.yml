name: Deploy to cPanel

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP
        run: |
          echo "${{ secrets.SFTP_PRIVATE_KEY }}" > /tmp/ssh_key
          chmod 600 /tmp/ssh_key
          lftp -c "
            set sftp:auto-confirm yes
            set sftp:connect-program 'ssh -a -x -i /tmp/ssh_key'
            open -u ercaango, -p 22 sftp://ercaangola.co.ao
            mirror -R --delete --verbose ./dist/ ./public_html/
          "